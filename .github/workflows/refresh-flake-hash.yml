name: Refresh Flake Hash

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, reopened, synchronize]
    paths:
      - flake.nix
      - go.mod
      - go.sum
      - go.work
      - go.work.sum
      - _patches/**
      - _tools/update-flake-vendor-hash.sh
      - .github/workflows/ci.yml

concurrency:
  group: refresh-flake-hash-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh flake hash
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR branch
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Checkout current branch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Refresh flake hash
        run: ./_tools/update-flake-vendor-hash.sh

      - name: Commit refreshed hash
        run: |
          if git diff --quiet -- flake.nix; then
            echo "flake hash already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "Refresh flake vendor hash"

          branch_ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git push origin "HEAD:${branch_ref}"
