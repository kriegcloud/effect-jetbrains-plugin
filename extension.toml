id = "effect-tsgo"
name = "Effect TypeScript-Go"
description = "Effect Language Service for TypeScript — Effect-TS diagnostics powered by @effect/tsgo."
version = "0.0.1"
schema_version = 1
authors = ["RATIU5"]
repository = "https://github.com/RATIU5/zed-effect-tsgo"

[language_servers.effect-tsgo]
name = "effect-tsgo"
# effect-tsgo determines ScriptKind from LSP languageId (textDocument/didOpen).
# Maps Zed's language names to standard LSP languageId values:
#   typescript -> ScriptKindTS, typescriptreact -> ScriptKindTSX,
#   javascript -> ScriptKindJS, javascriptreact -> ScriptKindJSX
language_ids = { TypeScript = "typescript", TSX = "typescriptreact", JavaScript = "javascript", JSX = "javascriptreact" }
languages = ["TypeScript", "TSX", "JavaScript", "JSX"]
